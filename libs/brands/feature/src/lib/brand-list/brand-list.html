@if (loaded() ) {

<h1 class="text-2xl font-bold m-6">Brands Available</h1>

<div class="flex flex-row">
  <lab-form-text-control
    class="flex flex-1"
    label="Find a brand"
    placeholder="Filter by mark name or mark id"
    hint="Find available brands catalog"
    iconSuffix="search"
    [searchTerm]="searchTerm"
  ></lab-form-text-control>
  <lab-mini-fab-button
    class="pt-6 pr-4"
    arialLabel="Reload brands"
    icon="refresh"
    (execute)="reloadBrands()"
  ></lab-mini-fab-button>
</div>

<div class="flex flex-1">
  <lab-virtual-scroll
    (itemSelected)="onBrandSelected($event)"
    [dataSource]="dataSource()"
    [searchTerm]="searchTerm()"
  >
  </lab-virtual-scroll>
</div>
} @else {
<div class="w-full flex h-full justify-center">
  <lab-loading></lab-loading>
</div>

}
