@if (loaded() ) {

<h1 class="text-2xl font-bold m-6" i18n="@@BRANDS_CATALOG_TITLE">
  BRANDS_CATALOG_TITLE
</h1>

<div class="flex flex-row">
  <lab-form-text-control
    [searchTerm]="searchTerm"
    class="flex flex-1"
    label="BRAND_LIST_FIND_BRAND_LABEL"
    i18n-label="@@BRAND_LIST_FIND_BRAND_LABEL"
    placeholder="BRAND_LIST_FILTER_BY_MARK_PLACEHOLDER"
    i18n-placeholder="@@BRAND_LIST_FILTER_BY_MARK_PLACEHOLDER"
    [hint]="hint"
  ></lab-form-text-control>
  <lab-mini-fab-button
    class="pt-6 pr-4"
    arialLabel="BRAND_LIST_RELOAD_BRANDS_ARIALABEL"
    i18n-arialLabel="@@BRAND_LIST_RELOAD_BRANDS_ARIALABEL"
    icon="refresh"
    (execute)="reloadBrands()"
  ></lab-mini-fab-button>
</div>

<div class="flex flex-1">
  <lab-virtual-scroll
    (itemSelected)="onBrandSelected($event)"
    [dataSource]="dataSource()"
    [searchTerm]="searchTerm()"
  >
  </lab-virtual-scroll>
</div>
} @else {
<div class="w-full flex h-full justify-center">
  <lab-loading></lab-loading>
</div>

}
